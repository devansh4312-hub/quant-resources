<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSES — Problem Set Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Surfaces */
    --surface-lowest: #080b12;
    --surface-low: #0f1419;
    --surface-container: #161b22;
    --surface-container-high: #1c232b;
    --bg-input: #0d1117;

    /* Text - WCAG AA compliant */
    --on-surface: #e6edf3;
    --on-surface-secondary: #8b949e;
    --on-surface-muted: #6e7681;

    /* Primary accent */
    --primary: #22d3ee;
    --primary-dim: rgba(34, 211, 238, 0.15);
    --secondary: #3b82f6;

    /* Semantic colors */
    --accent-green: #10b981;
    --accent-amber: #f59e0b;
    --accent-red: #ef4444;
    --accent-purple: #a78bfa;
    --accent-rose: #f472b6;
    --accent-sky: #38bdf8;
    --accent-emerald: #34d399;
    --accent-yellow: #facc15;
    --accent-orange: #fb923c;
    --accent-teal: #2dd4bf;
    --accent-indigo: #818cf8;
    --accent-lime: #a3e635;
    --accent-fuchsia: #e879f9;
    --accent-slate: #94a3b8;

    /* Borders & shadows */
    --border-subtle: rgba(240, 246, 252, 0.1);
    --border-default: rgba(240, 246, 252, 0.15);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);

    /* Glows */
    --glow-primary: rgba(34, 211, 238, 0.15);
    --glow-secondary: rgba(59, 130, 246, 0.15);
    --glow-green: rgba(16, 185, 129, 0.15);

    /* Typography */
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'IBM Plex Sans', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

    /* Type scale */
    --text-xs: 10px;
    --text-sm: 12px;
    --text-base: 14px;
    --text-lg: 16px;
    --text-xl: 20px;
    --text-2xl: 24px;

    /* Radii */
    --radius-sm: 4px;
    --radius-md: 6px;
    --radius-lg: 10px;

    /* Easing */
    --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--surface-lowest);
    background-image: radial-gradient(ellipse at top, rgba(34, 211, 238, 0.03) 0%, transparent 50%);
    color: var(--on-surface);
    min-height: 100vh;
    line-height: 1.6;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--on-surface-muted); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--on-surface-secondary); }

  ::selection {
    background: rgba(34, 211, 238, 0.25);
    color: var(--on-surface);
  }

  /* ── Top Bar ── */
  .topbar {
    background: var(--surface-low);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-sm);
  }
  .topbar-brand {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--primary);
    display: flex; align-items: center; gap: 10px;
    text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
  }
  .topbar-brand .cses-dot {
    width: 8px; height: 8px;
    background: var(--accent-green);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    animation: pulse-dot 2s var(--ease-in-out) infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 8px rgba(16,185,129,0.5); }
    50% { box-shadow: 0 0 16px rgba(16,185,129,0.8), 0 0 0 4px rgba(16,185,129,0.1); }
  }
  .topbar-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 14px;
  }
  .streak-badge {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--accent-amber);
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.15);
    padding: 6px 14px;
    border-radius: var(--radius-md);
    display: flex; align-items: center; gap: 6px;
  }
  .icon-sm { width: 14px; height: 14px; }
  .icon-inline { width: 16px; height: 16px; vertical-align: -2px; margin-right: 2px; }
  .cat-icon svg { width: 14px; height: 14px; }
  .topbar-stat {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    color: var(--on-surface-muted);
  }
  .topbar-stat strong { color: var(--accent-green); }

  /* ── Layout ── */
  .shell {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface-low);
    border-right: 1px solid var(--border-subtle);
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    max-height: calc(100vh - 56px);
    position: sticky;
    top: 56px;
  }
  .sidebar-section { padding: 0 12px; margin-bottom: 24px; }
  .sidebar-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--on-surface-muted);
    margin-bottom: 10px;
    padding-left: 12px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: var(--font-body);
    font-size: var(--text-sm); font-weight: 500;
    color: var(--on-surface-secondary);
    transition: transform 160ms var(--ease-out), background 150ms var(--ease-out), color 150ms var(--ease-out), border-color 150ms var(--ease-out);
    border-left: 2px solid transparent;
    margin-bottom: 2px;
  }
  .nav-item:active { transform: scale(0.97); }
  @media (hover: hover) and (pointer: fine) {
    .nav-item:hover { background: var(--surface-container); color: var(--on-surface); }
  }
  .nav-item.active {
    background: var(--primary-dim);
    color: var(--primary);
    border-left-color: var(--primary);
    font-weight: 600;
    box-shadow: inset 0 0 0 1px rgba(34, 211, 238, 0.1), 0 0 12px rgba(34, 211, 238, 0.1);
  }
  .nav-item:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-low), 0 0 0 4px var(--primary);
  }
  .nav-icon {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    opacity: 0.6;
  }
  .nav-icon svg {
    width: 16px;
    height: 16px;
  }
  .nav-item.active .nav-icon { opacity: 1; }
  .nav-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.03em;
    background: var(--surface-container);
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    color: var(--on-surface-muted);
    flex-shrink: 0;
  }
  .nav-item.active .nav-badge { background: rgba(34,211,238,0.12); color: var(--primary); }

  /* ── Sidebar Footer ── */
  .sidebar-footer {
    margin-top: auto;
    padding: 14px;
  }
  .sidebar-progress-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--on-surface-muted);
    margin-bottom: 10px;
    display: flex; justify-content: space-between;
  }
  .sidebar-progress-label span { color: var(--primary); }
  .progress-bar-mini {
    width: 100%; height: 6px;
    background: var(--surface-lowest);
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border-subtle);
  }
  .progress-bar-mini-fill {
    height: 100%; border-radius: var(--radius-sm);
    background: var(--primary);
    box-shadow: 0 0 8px rgba(34, 211, 238, 0.4);
    transition: width 500ms var(--ease-in-out);
  }

  /* ── Main Content ── */
  .main {
    padding: 36px 44px;
    overflow-y: auto;
    max-height: calc(100vh - 56px);
  }
  .view { display: none; }
  .view.active { display: block; animation: viewIn 250ms var(--ease-out); }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Section Headers ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .section-header h2 {
    font-family: var(--font-display);
    font-size: var(--text-2xl); font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--on-surface);
  }
  .tag {
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
  }
  .tag-cyan { background: rgba(34,211,238,0.1); color: var(--primary); }
  .tag-green { background: rgba(16,185,129,0.1); color: var(--accent-green); }
  .tag-amber { background: rgba(245,158,11,0.1); color: var(--accent-amber); }
  .tag-red { background: rgba(239,68,68,0.1); color: var(--accent-red); }
  .tag-purple { background: rgba(167,139,250,0.1); color: var(--accent-purple); }
  .tag-rose { background: rgba(244,114,182,0.1); color: var(--accent-rose); }
  .tag-sky { background: rgba(56,189,248,0.1); color: var(--accent-sky); }
  .tag-emerald { background: rgba(52,211,153,0.1); color: var(--accent-emerald); }
  .tag-yellow { background: rgba(250,204,21,0.1); color: var(--accent-yellow); }
  .tag-orange { background: rgba(251,146,60,0.1); color: var(--accent-orange); }
  .tag-teal { background: rgba(45,212,191,0.1); color: var(--accent-teal); }
  .tag-indigo { background: rgba(129,140,248,0.1); color: var(--accent-indigo); }
  .tag-lime { background: rgba(163,230,53,0.1); color: var(--accent-lime); }
  .tag-fuchsia { background: rgba(232,121,249,0.1); color: var(--accent-fuchsia); }
  .tag-slate { background: rgba(148,163,184,0.1); color: var(--accent-slate); }

  /* ── Overview Stats ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 18px;
    transition: transform 150ms var(--ease-out), box-shadow 150ms var(--ease-out), border-color 150ms var(--ease-out);
    box-shadow: var(--shadow-sm);
    cursor: default;
  }
  .stat-card-clickable { cursor: pointer; }
  @media (hover: hover) and (pointer: fine) {
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md), 0 0 20px rgba(34, 211, 238, 0.05);
      border-color: var(--border-default);
    }
  }
  .stat-card-clickable:active { transform: scale(0.98); }
  .stat-card:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-lowest), 0 0 0 4px var(--primary);
  }
  .stat-card-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--on-surface-muted);
    margin-bottom: 8px;
  }
  .stat-card-value {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--on-surface);
  }
  .stat-card-sub {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--on-surface-muted);
    margin-top: 4px;
  }
  .stat-card-bar {
    height: 4px;
    background: var(--surface-lowest);
    border-radius: var(--radius-sm);
    margin-top: 12px;
    overflow: hidden;
  }
  .stat-card-bar-fill {
    height: 100%;
    border-radius: var(--radius-sm);
    box-shadow: 0 0 6px currentColor;
    transition: width 500ms var(--ease-in-out);
  }

  /* ── Puzzle Cards ── */
  .puzzle-card {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-bottom: 8px;
    transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out), transform 100ms var(--ease-out);
  }
  @media (hover: hover) and (pointer: fine) {
    .puzzle-card:hover {
      background: var(--surface-container-high);
      border-color: var(--border-default);
      box-shadow: var(--shadow-sm);
    }
  }
  .puzzle-card:active { transform: scale(0.995); }
  .puzzle-card.solved { opacity: 0.6; }
  .puzzle-top {
    display: flex; align-items: center; gap: 12px;
  }
  .puzzle-top input[type="checkbox"] { display: none; }
  .puzzle-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border-default);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), transform 100ms var(--ease-out);
    font-size: var(--text-sm);
    color: transparent;
  }
  .puzzle-check:active { transform: scale(0.9); }
  .puzzle-check:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-container), 0 0 0 4px var(--primary);
  }
  .puzzle-top input:checked + .puzzle-check {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #fff;
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
  }
  .puzzle-name {
    font-weight: 600; font-size: var(--text-base);
    cursor: pointer; flex: 1;
    transition: color 150ms var(--ease-out);
    color: var(--on-surface);
  }
  .puzzle-top input:checked ~ .puzzle-name {
    color: var(--on-surface-muted);
    text-decoration: line-through;
    text-decoration-color: var(--on-surface-muted);
  }
  .puzzle-num {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--on-surface-muted);
    min-width: 24px;
    flex-shrink: 0;
  }
  .puzzle-link {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    padding: 3px 10px;
    border-radius: var(--radius-sm);
    color: var(--primary);
    background: var(--primary-dim);
    text-decoration: none;
    flex-shrink: 0;
    transition: background 150ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .puzzle-link:active { transform: scale(0.95); }
  .puzzle-link:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-container), 0 0 0 4px var(--primary);
  }
  @media (hover: hover) and (pointer: fine) {
    .puzzle-link:hover {
      background: rgba(34,211,238,0.2);
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
    }
  }
  .puzzle-notes-row {
    margin-top: 8px;
    padding-left: 30px;
    display: none;
  }
  .puzzle-card.has-notes .puzzle-notes-row,
  .puzzle-card.editing .puzzle-notes-row { display: block; }
  .puzzle-notes-text {
    font-size: var(--text-sm);
    color: var(--on-surface-secondary);
    font-style: italic;
    line-height: 1.5;
    cursor: pointer;
  }
  .puzzle-notes-input {
    font-family: var(--font-body);
    font-size: var(--text-sm);
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--on-surface);
    padding: 8px 12px;
    outline: none;
    resize: none;
    transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
    display: none;
  }
  .puzzle-card.editing .puzzle-notes-input { display: block; }
  .puzzle-card.editing .puzzle-notes-text { display: none; }
  .puzzle-notes-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15), 0 0 16px rgba(34, 211, 238, 0.1);
  }
  .puzzle-actions {
    display: flex; gap: 6px; align-items: center;
  }
  .btn-note {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    padding: 6px;
    border-radius: var(--radius-sm);
    background: var(--surface-lowest);
    color: var(--on-surface-muted);
    border: none;
    cursor: pointer;
    transition: color 150ms var(--ease-out), background 150ms var(--ease-out), transform 100ms var(--ease-out);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-note svg {
    width: 14px;
    height: 14px;
  }
  .btn-note:active { transform: scale(0.9); }
  .btn-note:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-container), 0 0 0 4px var(--primary);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-note:hover { color: var(--on-surface-secondary); background: var(--surface-container-high); }
  }

  /* ── Filter ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .filter-chip {
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    background: var(--surface-container);
    color: var(--on-surface-muted);
    cursor: pointer;
    transition: color 150ms var(--ease-out), background 150ms var(--ease-out), border-color 150ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .filter-chip:active { transform: scale(0.96); }
  @media (hover: hover) and (pointer: fine) {
    .filter-chip:hover { color: var(--on-surface-secondary); border-color: var(--border-default); }
  }
  .filter-chip.active {
    background: var(--primary-dim);
    color: var(--primary);
    border-color: rgba(34, 211, 238, 0.2);
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.15);
  }
  .filter-chip:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--surface-lowest), 0 0 0 4px var(--primary);
  }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface-container);
    border: 1px solid var(--accent-green);
    color: var(--accent-green);
    padding: 12px 20px;
    border-radius: var(--radius-md);
    font-size: var(--text-base); font-family: var(--font-mono);
    z-index: 1000;
    opacity: 0; transform: translateY(10px) scale(0.95);
    transition: opacity 250ms var(--ease-out), transform 250ms var(--ease-out);
    pointer-events: none;
    box-shadow: var(--shadow-lg), 0 0 20px rgba(16, 185, 129, 0.2);
  }
  .toast.show { opacity: 1; transform: translateY(0) scale(1); }

  /* ── Export Modal ── */
  .export-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 900;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 200ms ease;
  }
  .export-overlay.open { opacity: 1; pointer-events: all; }
  .export-modal {
    background: var(--surface-container);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
    width: 420px;
    max-width: calc(100vw - 32px);
    box-shadow: var(--shadow-lg);
    transform: translateY(8px) scale(0.98);
    transition: transform 220ms var(--ease-out);
  }
  .export-overlay.open .export-modal { transform: translateY(0) scale(1); }
  .export-modal-title {
    font-family: var(--font-mono);
    font-size: var(--text-base);
    font-weight: 600;
    color: var(--on-surface);
    margin-bottom: 4px;
    letter-spacing: 0.03em;
  }
  .export-modal-subtitle {
    font-size: var(--text-sm);
    color: var(--on-surface-secondary);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .export-field-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--on-surface-muted);
    margin-bottom: 6px;
  }
  .export-filename-input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--on-surface);
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    padding: 9px 12px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .export-filename-input:focus { border-color: var(--primary); }
  .export-hint {
    font-size: var(--text-xs);
    color: var(--on-surface-muted);
    margin-top: 8px;
    line-height: 1.5;
  }
  .export-modal-actions {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 22px;
  }
  .export-btn-cancel {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--on-surface-secondary);
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: 500;
    cursor: pointer;
    transition: border-color 150ms ease, color 150ms ease;
  }
  .export-btn-cancel:hover { border-color: var(--on-surface-secondary); color: var(--on-surface); }
  .export-btn-download {
    padding: 8px 18px;
    background: var(--primary);
    border: none;
    border-radius: var(--radius-md);
    color: #0d1117;
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 150ms ease;
  }
  .export-btn-download:hover { opacity: 0.88; }

  /* ── Export / Import ── */
  .btn-io {
    flex: 1;
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 10px 0;
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--on-surface-muted);
    cursor: pointer;
    transition: transform 160ms var(--ease-out), color 150ms var(--ease-out), border-color 150ms var(--ease-out), background 150ms var(--ease-out);
  }
  .btn-io:active { transform: scale(0.95); }
  .btn-io:focus-visible {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
  }
  @media (hover: hover) and (pointer: fine) {
    .btn-io:hover {
      color: var(--on-surface);
      border-color: var(--primary);
      background: var(--primary-dim);
    }
  }

  /* ── Search ── */
  .search-box {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .search-box input {
    font-family: var(--font-body);
    font-size: var(--text-base);
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--on-surface);
    padding: 10px 16px;
    outline: none;
    width: 100%;
    max-width: 400px;
    transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
  }
  .search-box input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15), 0 0 20px rgba(34, 211, 238, 0.1);
  }
  .search-box input::placeholder { color: var(--on-surface-muted); }

  /* ── Tier Dropdown ── */
  .tier-dropdown {
    margin-top: 20px;
    border-top: 1px solid var(--border-subtle);
    padding-top: 16px;
  }
  .tier-dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: none;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 12px 16px;
    width: 100%;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--on-surface-secondary);
    transition: all 150ms var(--ease-out);
  }
  .tier-dropdown-toggle:hover {
    background: var(--surface-lowest);
    border-color: var(--border-default);
    color: var(--on-surface);
  }
  .tier-dropdown-toggle .chevron {
    margin-left: auto;
    transition: transform 200ms var(--ease-out);
  }
  .tier-dropdown-toggle.open .chevron {
    transform: rotate(180deg);
  }
  .tier-dropdown-content {
    display: none;
    margin-top: 12px;
    max-height: 500px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .tier-dropdown-content.open {
    display: block;
    animation: slideDown 200ms var(--ease-out);
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tier-dropdown-content::-webkit-scrollbar {
    width: 6px;
  }
  .tier-dropdown-content::-webkit-scrollbar-track {
    background: var(--surface-lowest);
    border-radius: 3px;
  }
  .tier-dropdown-content::-webkit-scrollbar-thumb {
    background: var(--border-default);
    border-radius: 3px;
  }
  .tier-problem-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    transition: background 100ms var(--ease-out);
  }
  .tier-problem-row:hover {
    background: var(--surface-lowest);
  }
  .tier-problem-check {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-default);
    border-radius: 3px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 150ms var(--ease-out);
    background: transparent;
    position: relative;
  }
  .tier-problem-check:checked {
    background: var(--accent-green);
    border-color: var(--accent-green);
  }
  .tier-problem-check:checked::after {
    content: '✓';
    color: #fff;
    font-size: 10px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .tier-problem-name {
    flex: 1;
    font-size: var(--text-sm);
    color: var(--on-surface);
  }
  .tier-problem-row.solved .tier-problem-name {
    color: var(--on-surface-muted);
    text-decoration: line-through;
  }
  .tier-problem-cat {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    background: var(--surface-lowest);
    color: var(--on-surface-muted);
  }
  .tier-problem-link {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--primary);
    text-decoration: none;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    background: var(--primary-dim);
    opacity: 0;
    transition: opacity 150ms var(--ease-out);
  }
  .tier-problem-row:hover .tier-problem-link {
    opacity: 1;
  }
  .tier-stats-inline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--on-surface-muted);
    margin-left: 4px;
  }

  /* ── Progression Plan ── */
  .plan-tier {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .plan-tier-header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border-subtle);
    flex-wrap: wrap;
  }
  .plan-tier-badge {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 700;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .plan-tier-header h3 {
    font-size: var(--text-lg);
    font-weight: 700;
    color: var(--on-surface);
    flex: 1;
  }
  .plan-tier-hours {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    color: var(--on-surface-muted);
    background: var(--surface-lowest);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
  }
  .plan-tier-body {
    padding: 24px;
  }
  .plan-tier-desc {
    color: var(--on-surface-secondary);
    font-size: var(--text-sm);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .plan-topic {
    margin-bottom: 16px;
  }
  .plan-topic-name {
    font-weight: 600;
    font-size: var(--text-sm);
    color: var(--on-surface);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .plan-topic-name::before {
    content: "▸";
    color: var(--primary);
  }
  .plan-problems {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-left: 16px;
  }
  .plan-problem-chip {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--surface-lowest);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    color: var(--on-surface-secondary);
    transition: all 150ms var(--ease-out);
  }
  .plan-problem-chip:hover {
    background: var(--primary-dim);
    border-color: rgba(34, 211, 238, 0.3);
    color: var(--primary);
  }
  .plan-tip {
    margin-top: 20px;
    padding: 14px 18px;
    background: rgba(245, 158, 11, 0.08);
    border-left: 3px solid var(--accent-amber);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    font-size: var(--text-sm);
    color: var(--on-surface-secondary);
    line-height: 1.6;
  }
  .plan-tip strong {
    color: var(--accent-amber);
  }

  /* Problem rating badges */
  .rating-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: var(--radius-sm);
    margin-left: 8px;
  }
  .rating-800 { background: rgba(128,128,128,0.15); color: #808080; }
  .rating-900 { background: rgba(128,128,128,0.15); color: #808080; }
  .rating-1000 { background: rgba(0,160,0,0.15); color: #00a000; }
  .rating-1100 { background: rgba(0,160,0,0.15); color: #00a000; }
  .rating-1200 { background: rgba(3,168,158,0.15); color: #03a89e; }
  .rating-1300 { background: rgba(3,168,158,0.15); color: #03a89e; }
  .rating-1400 { background: rgba(0,0,255,0.12); color: #5555ff; }
  .rating-1500 { background: rgba(0,0,255,0.12); color: #5555ff; }
  .rating-1600 { background: rgba(170,0,170,0.12); color: #aa00aa; }
  .rating-1700 { background: rgba(170,0,170,0.12); color: #aa00aa; }
  .rating-1800 { background: rgba(170,0,170,0.12); color: #aa00aa; }
  .rating-1900 { background: rgba(255,140,0,0.15); color: #ff8c00; }
  .rating-2000 { background: rgba(255,140,0,0.15); color: #ff8c00; }

  /* Stats for progression */
  .tier-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .tier-stat-card {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 16px 20px;
    min-width: 140px;
    flex: 1;
  }
  .tier-stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--on-surface-muted);
    margin-bottom: 6px;
  }
  .tier-stat-value {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar {
      border-bottom: 1px solid var(--surface-container);
      padding: 10px 0;
      flex-direction: row;
      overflow-x: auto; gap: 4px;
      max-height: none;
      position: static;
    }
    .sidebar-section { padding: 0 8px; margin-bottom: 0; display: flex; gap: 4px; flex-wrap: nowrap; }
    .sidebar-label { display: none; }
    .sidebar-footer { display: none; }
    .nav-item { white-space: nowrap; padding: 6px 8px; font-size: 11px; border-left: none; border-bottom: 2px solid transparent; }
    .nav-item.active { border-left-color: transparent; border-bottom-color: var(--primary); }
    .main { padding: 20px 16px; max-height: none; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── Universal Search ── */
  .usearch-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    position: relative;
  }
  .usearch-input-wrap {
    position: relative;
    flex: 1;
    max-width: 560px;
  }
  .usearch-input-wrap svg.usearch-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--on-surface-muted);
    pointer-events: none;
  }
  .usearch-input {
    font-family: var(--font-body);
    font-size: var(--text-base);
    background: var(--bg-input);
    border: 1px solid var(--border-default);
    border-radius: var(--radius-md);
    color: var(--on-surface);
    padding: 11px 16px 11px 42px;
    outline: none;
    width: 100%;
    transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
  }
  .usearch-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15), 0 0 20px rgba(34, 211, 238, 0.08);
  }
  .usearch-input::placeholder { color: var(--on-surface-muted); }
  .usearch-kbd {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--on-surface-muted);
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: 4px;
    padding: 2px 6px;
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .usearch-wildcard-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--on-surface-muted);
    margin-top: 5px;
    padding-left: 2px;
  }
  .usearch-wildcard-hint code {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: 3px;
    padding: 0 4px;
    color: var(--primary);
    font-family: var(--font-mono);
  }
  .usearch-meta {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--on-surface-muted);
    white-space: nowrap;
  }
  .usearch-filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .usearch-filter-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--on-surface-muted);
    margin-right: 4px;
  }
  .usearch-results {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .usearch-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--on-surface-muted);
    font-size: var(--text-base);
  }
  .usearch-empty .usearch-empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.4;
  }
  .usearch-empty-hint {
    font-size: var(--text-sm);
    color: var(--on-surface-muted);
    margin-top: 6px;
    opacity: 0.7;
  }
  .usearch-card {
    background: var(--surface-container);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
    cursor: pointer;
  }
  @media (hover: hover) and (pointer: fine) {
    .usearch-card:hover {
      background: var(--surface-container-high);
      border-color: var(--border-default);
      box-shadow: var(--shadow-sm);
    }
  }
  .usearch-card:active { transform: scale(0.998); }
  .usearch-card.solved-card { opacity: 0.55; }
  .usearch-card-check {
    width: 18px; height: 18px;
    border: 2px solid var(--border-default);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    color: transparent;
    transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
  }
  .usearch-card.solved-card .usearch-card-check {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #fff;
    box-shadow: 0 0 8px rgba(16,185,129,0.4);
  }
  .usearch-card-name {
    flex: 1;
    font-weight: 600;
    font-size: var(--text-base);
    color: var(--on-surface);
  }
  .usearch-card-name mark {
    background: rgba(34,211,238,0.22);
    color: var(--primary);
    border-radius: 2px;
    padding: 0 1px;
  }
  .usearch-card-cat {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: var(--radius-sm);
    background: var(--surface-lowest);
    color: var(--on-surface-muted);
    flex-shrink: 0;
  }
  .usearch-card-link {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--primary);
    background: var(--primary-dim);
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    flex-shrink: 0;
    transition: background 150ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .usearch-card-link:hover { background: rgba(34,211,238,0.2); }
  .usearch-card-link:active { transform: scale(0.95); }
  .usearch-group-header {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--on-surface-muted);
    margin-top: 18px;
    margin-bottom: 8px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .usearch-group-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }
  .usearch-count-badge {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--on-surface-muted);
    background: var(--surface-container);
    padding: 2px 7px;
    border-radius: 999px;
  }


  /* ── Sort Bar ── */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sort-label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--on-surface-muted);
    white-space: nowrap;
  }
  .sort-chip {
    font-family: var(--font-mono);
    font-size: var(--text-xs); font-weight: 600;
    letter-spacing: 0.04em;
    padding: 5px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    background: var(--surface-container);
    color: var(--on-surface-muted);
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    transition: color 150ms var(--ease-out), background 150ms var(--ease-out), border-color 150ms var(--ease-out), transform 100ms var(--ease-out);
  }
  .sort-chip:active { transform: scale(0.96); }
  @media (hover: hover) and (pointer: fine) {
    .sort-chip:hover { color: var(--on-surface-secondary); border-color: var(--border-default); }
  }
  .sort-chip.active {
    background: rgba(167,139,250,0.12);
    color: var(--accent-purple);
    border-color: rgba(167,139,250,0.25);
    box-shadow: 0 0 10px rgba(167,139,250,0.15);
  }
  .sort-chip svg { width: 11px; height: 11px; }

  /* ── Activity Heatmap ── */
  .heatmap-wrap { background: var(--surface-container); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .heatmap-scroll { overflow-x: auto; }
  .heatmap-inner { display: inline-flex; flex-direction: column; gap: 4px; }
  .heatmap-month-row { display: flex; align-items: flex-end; gap: 3px; margin-bottom: 2px; }
  .heatmap-day-spacer { width: 28px; flex-shrink: 0; }
  .heatmap-month-label { width: 15px; flex-shrink: 0; font-family: var(--font-mono); font-size: 9px; color: var(--on-surface-muted); overflow: visible; white-space: nowrap; }
  .heatmap-body-row { display: flex; gap: 4px; }
  .heatmap-day-labels { display: flex; flex-direction: column; gap: 3px; width: 24px; flex-shrink: 0; align-items: flex-end; }
  .heatmap-day-label { height: 12px; font-family: var(--font-mono); font-size: 9px; color: var(--on-surface-muted); line-height: 12px; }
  .heatmap-weeks { display: flex; gap: 3px; }
  .heatmap-week { display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; cursor: default; }

// ── Streak ──
let streak = parseInt(localStorage.getItem('cses_streak') || '0');
let lastVisit = localStorage.getItem('cses_last_visit') || '';
function updateStreak() {
  const _now = new Date();
  const today = _now.getFullYear() + '-' + String(_now.getMonth()+1).padStart(2,'0') + '-' + String(_now.getDate()).padStart(2,'0');
  if (!lastVisit) { streak = 1; }
  else if (lastVisit === today) { /* same day */ }
  else {
    const diff = (new Date(today) - new Date(lastVisit)) / 86400000;
    streak = diff <= 1 ? streak + 1 : 1;
  }
  lastVisit = today;
  localStorage.setItem('cses_streak', streak);
  localStorage.setItem('cses_last_visit', lastVisit);
  document.getElementById('streakCount').textContent = streak;
}
updateStreak();

// ── Helpers ──
function pid(cat, i) { return cat + '_' + i; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function regexEscape(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function save() { localStorage.setItem('cses_state', JSON.stringify(state)); }

function getStats() {
  const out = {};
  let totalSolved = 0, totalAll = 0;
  for (const cat of Object.keys(PROBLEMS)) {
    let solved = 0;
    PROBLEMS[cat].forEach((_, i) => { if (state[pid(cat,i)]?.done) solved++; });
    out[cat] = { solved, total: PROBLEMS[cat].length };
    totalSolved += solved;
    totalAll += PROBLEMS[cat].length;
  }
  out._all = { solved: totalSolved, total: totalAll };
  return out;
}

// ── Toggle Solve ──
function toggleSolve(cat, idx) {
  const id = pid(cat, idx);
  if (!state[id]) state[id] = {};
  state[id].done = !state[id].done;
  if (state[id].done) state[id].solvedAt = Date.now();
  save();
  updateActivity(state[id].done ? 1 : -1);
  renderList(cat);
  renderOverview();
  updateBadges();
  // Re-render active special views
  const activeView = document.querySelector('.view.active');
  const activeId = activeView ? activeView.id : '';
  if (activeId === 'view-usearch') renderUniversalSearch();
  if (activeId === 'view-progression') renderProgression();
  showToast(state[id].done ? '✓ Marked as solved' : '↩ Unmarked');
}

// ── Notes ──
function toggleNoteEdit(cat, idx) {
  const card = document.getElementById('card-' + pid(cat, idx));
  if (card.classList.contains('editing')) {
    saveNote(cat, idx);
  } else {
    card.classList.add('editing');
    const input = card.querySelector('.puzzle-notes-input');
    input.focus();
  }
}

function saveNote(cat, idx) {
  const card = document.getElementById('card-' + pid(cat, idx));
  if (!card.classList.contains('editing')) return;

  const input = card.querySelector('.puzzle-notes-input');
  const id = pid(cat, idx);
  if (!state[id]) state[id] = {};
  state[id].notes = input.value.trim();
  save();
  card.classList.remove('editing');
  if (state[id].notes) card.classList.add('has-notes');
  else card.classList.remove('has-notes');
  renderList(cat);
}

function noteKeydown(e, cat, idx) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveNote(cat, idx); }
  if (e.key === 'Escape') { saveNote(cat, idx); }
}

function noteBlur(e, cat, idx) {
  setTimeout(() => saveNote(cat, idx), 150);
}

// ── Filter ──
function setFilter(cat, filter, el) {
  filters[cat] = filter;
  // Only toggle among the status filters (first 3)
  const chips = el.parentElement.querySelectorAll('.filter-chip');
  chips[0].classList.remove('active');
  chips[1].classList.remove('active');
  chips[2].classList.remove('active');
  el.classList.add('active');
  renderList(cat);
}

function setRatingFilter(cat, range, el) {
  const chips = el.parentElement.querySelectorAll('.filter-chip');
  // Check if clicking the same filter (toggle off)
  if (ratingFilters[cat] === range) {
    ratingFilters[cat] = null;
    el.classList.remove('active');
  } else {
    // Remove active from rating filters only (indices 3-7, after the separator)
    for (let i = 3; i < chips.length; i++) chips[i].classList.remove('active');
    ratingFilters[cat] = range;
    el.classList.add('active');
  }
  renderList(cat);
}

function setSearch(cat, val) {
  searchTerms[cat] = val.toLowerCase();
  renderList(cat);
}

function setSortOrder(cat, order, el) {
  sortOrders[cat] = order;
  const bar = el.closest('.sort-bar');
  bar.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList(cat);
}

// ── Render Puzzle List ──
function renderList(cat) {
  const container = document.getElementById('list-' + cat);
  if (!container) return;
  let html = '';

  // Build sorted index array
  const sortOrder = sortOrders[cat] || 'cses';
  let indices = PROBLEMS[cat].map((_, i) => i);
  if (sortOrder === 'rating-asc') {
    indices.sort((a, b) => (PROBLEMS[cat][a].r || 1000) - (PROBLEMS[cat][b].r || 1000));
  } else if (sortOrder === 'rating-desc') {
    indices.sort((a, b) => (PROBLEMS[cat][b].r || 1000) - (PROBLEMS[cat][a].r || 1000));
  } else {
    // CSES order: use CSES_ORDER if available, else keep original
    const csesList = CSES_ORDER[cat];
    if (csesList) {
      const csesIdx = {};
      csesList.forEach((name, pos) => { csesIdx[name] = pos; });
      indices.sort((a, b) => {
        const pa = csesIdx[PROBLEMS[cat][a].n] ?? 9999;
        const pb = csesIdx[PROBLEMS[cat][b].n] ?? 9999;
        return pa - pb;
      });
    }
  }

  let displayPos = 0;
  indices.forEach((i) => {
    const problem = PROBLEMS[cat][i];
    const id = pid(cat, i);
    const done = state[id]?.done || false;
    const notes = state[id]?.notes || '';
    const filter = filters[cat];
    const search = searchTerms[cat];

    if (filter === 'solved' && !done) return;
    if (filter === 'unsolved' && done) return;
    if (search && !problem.n.toLowerCase().includes(search)) return;

    // Rating filter
    const rFilter = ratingFilters[cat];
    if (rFilter) {
      const r = problem.r || 1000;
      if (rFilter === '800-999' && (r < 800 || r > 999)) return;
      if (rFilter === '1000-1199' && (r < 1000 || r > 1199)) return;
      if (rFilter === '1200-1399' && (r < 1200 || r > 1399)) return;
      if (rFilter === '1400-1599' && (r < 1400 || r > 1599)) return;
      if (rFilter === '1600+' && r < 1600) return;
    }

    const url = problem.id ? 'https://cses.fi/problemset/task/' + problem.id : 'https://cses.fi/problemset/';
    const rating = problem.r || 1000;
    const ratingClass = getRatingClass(rating);

    html += `<div class="puzzle-card ${done ? 'solved' : ''} ${notes ? 'has-notes' : ''}" id="card-${id}">
      <div class="puzzle-top">
        <span class="puzzle-num">${++displayPos}.</span>
        <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleSolve('${cat}',${i})">
          <span class="puzzle-check">✓</span>
          <span class="puzzle-name">${esc(problem.n)}</span>
          <span class="rating-badge ${ratingClass}">${rating}</span>
        </label>
        <div class="puzzle-actions">
          <button class="btn-note" onclick="toggleNoteEdit('${cat}',${i})" title="Add/edit notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
          <a class="puzzle-link" href="${url}" target="_blank" rel="noopener">CSES ↗</a>
        </div>
      </div>
      <div class="puzzle-notes-row">
        <div class="puzzle-notes-text" onclick="toggleNoteEdit('${cat}',${i})">${notes ? esc(notes) : 'Click to add notes...'}</div>
        <textarea class="puzzle-notes-input" rows="2" onkeydown="noteKeydown(event,'${cat}',${i})" onblur="noteBlur(event,'${cat}',${i})" placeholder="Key idea, approach, complexity...">${notes}</textarea>
      </div>
    </div>`;
  });

  if (!html) {
    html = `<div style="text-align:center;padding:40px;color:var(--on-surface-muted);font-size:13px;">
      ${filters[cat] === 'solved' ? 'No problems solved yet in this category.' : searchTerms[cat] ? 'No problems match your search.' : 'All problems solved!'}
    </div>`;
  }

  container.innerHTML = html;
}

// ── Render Overview ──
function renderOverview() {
  const stats = getStats();
  const grid = document.getElementById('statsGrid');
  if (!grid) return;

  const cards = [{
    label: 'Total Solved', value: stats._all.solved,
    sub: `out of ${stats._all.total}`,
    pct: stats._all.total > 0 ? stats._all.solved/stats._all.total*100 : 0,
    color: 'var(--primary)'
  }];

  for (const cat of Object.keys(PROBLEMS)) {
    const meta = CAT_META[cat];
    const s = stats[cat];
    cards.push({
      label: meta.label, value: s.solved,
      sub: `out of ${s.total}`,
      pct: s.total > 0 ? s.solved/s.total*100 : 0,
      color: meta.color,
      view: cat
    });
  }

  grid.innerHTML = cards.map(c => `
    <div class="stat-card${c.view ? ' stat-card-clickable' : ''}"${c.view ? ` onclick="switchView('${c.view}')" onkeydown="if(event.key==='Enter')switchView('${c.view}')" role="button" tabindex="0" aria-label="Go to ${c.label}"` : ''}>
      <div class="stat-card-label">${c.label}</div>
      <div class="stat-card-value" style="color:${c.color}">${c.value}</div>
      <div class="stat-card-sub">${c.sub}</div>
      <div class="stat-card-bar">
        <div class="stat-card-bar-fill" style="width:${Math.round(c.pct)}%;background:${c.color}"></div>
      </div>
    </div>
  `).join('');

  // Recent solves
  const recent = [];
  for (const cat of Object.keys(PROBLEMS)) {
    PROBLEMS[cat].forEach((problem, i) => {
      const id = pid(cat, i);
      if (state[id]?.done && state[id]?.solvedAt) {
        recent.push({ name: problem.n, cat, time: state[id].solvedAt });
      }
    });
  }
  recent.sort((a, b) => b.time - a.time);

  const recentEl = document.getElementById('recentList');
  if (recent.length === 0) {
    recentEl.innerHTML = '<div style="color:var(--on-surface-muted);font-size:13px;padding:20px 0;">No problems solved yet. Start grinding!</div>';
  } else {
    recentEl.innerHTML = recent.slice(0, 12).map(r => {
      const meta = CAT_META[r.cat];
      const ago = timeAgo(r.time);
      return `<div class="puzzle-card" style="cursor:default">
        <div class="puzzle-top">
          <span class="cat-icon" style="color:${meta.color}">${meta.icon}</span>
          <span class="puzzle-name" style="text-decoration:none;color:var(--on-surface)">${esc(r.name)}</span>
          <span class="tag ${meta.tagClass}" style="font-size:9px">${meta.label}</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--on-surface-muted);margin-left:auto">${ago}</span>
        </div>
      </div>`;
    }).join('');
  }
  renderHeatmap();
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

// ── Get rating class ──
function getRatingClass(r) {
  if (r >= 1900) return 'rating-1900';
  if (r >= 1800) return 'rating-1800';
  if (r >= 1700) return 'rating-1700';
  if (r >= 1600) return 'rating-1600';
  if (r >= 1500) return 'rating-1500';
  if (r >= 1400) return 'rating-1400';
  if (r >= 1300) return 'rating-1300';
  if (r >= 1200) return 'rating-1200';
  if (r >= 1100) return 'rating-1100';
  if (r >= 1000) return 'rating-1000';
  if (r >= 900) return 'rating-900';
  return 'rating-800';
}

// ── Get all problems in a rating range ──
function getProblemsInRange(minR, maxR) {
  const results = [];
  for (const cat of Object.keys(PROBLEMS)) {
    PROBLEMS[cat].forEach((problem, i) => {
      const r = problem.r || 1000;
      if (r >= minR && r <= maxR) {
        results.push({
          name: problem.n,
          id: problem.id,
          r: r,
          cat: cat,
          idx: i,
          catLabel: CAT_META[cat].label,
          pid: pid(cat, i),
          solved: state[pid(cat, i)]?.done || false
        });
      }
    });
  }
  // Sort by rating, then by name
  results.sort((a, b) => a.r - b.r || a.name.localeCompare(b.name));
  return results;
}

// ── Render Progression Plan ──
function renderProgression() {
  const container = document.getElementById('progressionContent');
  const statsContainer = document.getElementById('tierStats');
  if (!container) return;

  // Save which dropdowns are currently open
  const openDropdowns = new Set();
  PROGRESSION_PLAN.forEach((_, idx) => {
    const content = document.getElementById('tier-content-' + idx);
    if (content && content.classList.contains('open')) openDropdowns.add(idx);
  });

  // Calculate tier stats
  const tierCounts = {};
  RATING_TIERS.forEach(t => {
    tierCounts[t.label] = { total: 0, solved: 0 };
  });

  for (const cat of Object.keys(PROBLEMS)) {
    PROBLEMS[cat].forEach((problem, i) => {
      const tier = RATING_TIERS.find(t => problem.r >= t.min && problem.r <= t.max);
      if (tier) {
        tierCounts[tier.label].total++;
        if (state[pid(cat, i)]?.done) tierCounts[tier.label].solved++;
      }
    });
  }

  // Render tier stats
  statsContainer.innerHTML = RATING_TIERS.map(t => {
    const c = tierCounts[t.label];
    const pct = c.total > 0 ? Math.round(c.solved / c.total * 100) : 0;
    return `<div class="tier-stat-card">
      <div class="tier-stat-label">${t.label}</div>
      <div class="tier-stat-value" style="color:${t.color}">${c.solved}/${c.total}</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--on-surface-muted);margin-top:4px">${pct}% done</div>
    </div>`;
  }).join('');

  // Render progression tiers
  let html = '';
  PROGRESSION_PLAN.forEach((plan, idx) => {
    // Determine rating range for this tier
    const tierInfo = RATING_TIERS[idx];
    const minR = tierInfo ? tierInfo.min : 800;
    const maxR = tierInfo ? tierInfo.max : 9999;
    const allProblems = getProblemsInRange(minR, maxR);
    const solvedCount = allProblems.filter(p => p.solved).length;

    html += `<div class="plan-tier">
      <div class="plan-tier-header">
        <span class="plan-tier-badge" style="background:${plan.color}22;color:${plan.color}">${plan.focus}</span>
        <h3>${plan.tier}</h3>
        <span class="plan-tier-hours"><svg class="icon-inline"><use href="#icon-clock"/></svg> ${plan.hours}</span>
      </div>
      <div class="plan-tier-body">
        <p class="plan-tier-desc">${plan.description}</p>
        ${plan.topics.map(topic => `
          <div class="plan-topic">
            <div class="plan-topic-name">${topic.name}</div>
            <div class="plan-problems">
              ${topic.problems.map(p => `<span class="plan-problem-chip">${esc(p)}</span>`).join('')}
            </div>
          </div>
        `).join('')}
        <div class="plan-tip"><strong><svg class="icon-inline"><use href="#icon-lightbulb"/></svg> Pro Tip:</strong> ${plan.tip}</div>

        <div class="tier-dropdown">
          <button class="tier-dropdown-toggle" id="tier-toggle-${idx}" onclick="toggleTierDropdown(${idx})">
            <svg class="icon-inline"><use href="#icon-list"/></svg> View All Problems in This Range
            <span class="tier-stats-inline">(${solvedCount}/${allProblems.length} solved)</span>
            <span class="chevron">▼</span>
          </button>
          <div class="tier-dropdown-content" id="tier-content-${idx}">
            ${allProblems.map(p => `
              <div class="tier-problem-row ${p.solved ? 'solved' : ''}" onclick="toggleSolve('${p.cat}', ${p.idx})" style="cursor:pointer">
                <input type="checkbox" class="tier-problem-check" ${p.solved ? 'checked' : ''} onclick="event.stopPropagation();toggleSolve('${p.cat}', ${p.idx})">
                <span class="tier-problem-name">${esc(p.name)}</span>
                <span class="rating-badge ${getRatingClass(p.r)}">${p.r}</span>
                <span class="tier-problem-cat">${p.catLabel.split(' ')[0]}</span>
                ${p.id ? `<a class="tier-problem-link" href="https://cses.fi/problemset/task/${p.id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open ↗</a>` : ""}
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
  });

  container.innerHTML = html;

  // Restore open dropdown states
  openDropdowns.forEach(idx => {
    const toggle = document.getElementById('tier-toggle-' + idx);
    const content = document.getElementById('tier-content-' + idx);
    if (toggle) toggle.classList.add('open');
    if (content) content.classList.add('open');
  });
}

function parseWildcardQuery(query) {
  if (!query.includes('%')) return { hasWildcard: false };
  const startAnchored = !query.startsWith('%');
  const endAnchored = !query.endsWith('%');
  const segments = query.split('%').filter(s => s.length > 0);
  if (!segments.length) return { hasWildcard: true, regex: /^.*$/i, segments: [], startAnchored: false, endAnchored: false };
  const regexStr = (startAnchored ? '^' : '^.*?') +
    segments.map(s => '(' + regexEscape(s) + ')').join('.*?') +
    (endAnchored ? '$' : '.*$');
  return { hasWildcard: true, regex: new RegExp(regexStr, 'i'), segments, startAnchored, endAnchored };
}

function matchWildcard(text, parsed) {
  if (!parsed.regex.test(text)) return null;
  if (!parsed.segments.length) return [];
  const lower = text.toLowerCase();
  const ranges = [];
  if (parsed.endAnchored) {
    let endPos = lower.length;
    for (let i = parsed.segments.length - 1; i >= 0; i--) {
      const seg = parsed.segments[i].toLowerCase();
      const idx = lower.lastIndexOf(seg, endPos - seg.length);
      if (idx === -1) return null;
      ranges.unshift({ start: idx, end: idx + seg.length });
      endPos = idx;
    }
  } else {
    let pos = 0;
    for (const seg of parsed.segments) {
      const idx = lower.indexOf(seg.toLowerCase(), pos);
      if (idx === -1) return null;
      ranges.push({ start: idx, end: idx + seg.length });
      pos = idx + seg.length;
    }
  }
  return ranges;
}

function highlightMatch(text, query, parsed) {
  if (!query) return esc(text);
  if (parsed && parsed.hasWildcard) {
    const ranges = matchWildcard(text, parsed);
    if (!ranges || !ranges.length) return esc(text);
    let result = '';
    let pos = 0;
    for (const { start, end } of ranges) {
      result += esc(text.slice(pos, start)) + '<mark>' + esc(text.slice(start, end)) + '</mark>';
      pos = end;
    }
    result += esc(text.slice(pos));
    return result;
  }
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return esc(text);
  return esc(text.slice(0, idx)) + '<mark>' + esc(text.slice(idx, idx + query.length)) + '</mark>' + esc(text.slice(idx + query.length));
}

function getRatingRange(val) {
  if (!val) return null;
  if (val === '1900+') return [1900, Infinity];
  const [a, b] = val.split('-').map(Number);
  return [a, b];
}

function renderUniversalSearch() {
  const query = (document.getElementById('usearchInput')?.value || '').trim();
  const container = document.getElementById('usearchResults');
  const meta = document.getElementById('usearchMeta');
  if (!container) return;

  const rRange = getRatingRange(usearchRating);
  const parsed = query ? parseWildcardQuery(query) : null;

  // Collect all matching problems
  const allMatches = [];
  for (const cat of Object.keys(PROBLEMS)) {
    PROBLEMS[cat].forEach((problem, i) => {
      const solved = state[pid(cat, i)]?.done || false;
      // status filter
      if (usearchFilter === 'solved' && !solved) return;
      if (usearchFilter === 'unsolved' && solved) return;
      // rating filter
      if (rRange) {
        const r = problem.r || 1000;
        if (r < rRange[0] || r > rRange[1]) return;
      }
      // text filter
      if (query) {
        if (parsed && parsed.hasWildcard) {
          if (!parsed.regex.test(problem.n)) return;
        } else {
          if (!problem.n.toLowerCase().includes(query.toLowerCase())) return;
        }
      }

      allMatches.push({ problem, cat, idx: i, solved });
    });
  }

  meta.textContent = allMatches.length + ' result' + (allMatches.length !== 1 ? 's' : '');

  if (allMatches.length === 0) {
    const hint = query ? `No problems found matching "${esc(query)}"` : 'No problems match the current filters.';
    container.innerHTML = `<div class="usearch-empty">
      <div class="usearch-empty-icon">🔍</div>
      <div>${hint}</div>
      <div class="usearch-empty-hint">Try adjusting the filters or search term</div>
    </div>`;
    return;
  }

  function cardHTML(item, q) {
    const { problem, cat, idx, solved } = item;
    const meta = CAT_META[cat];
    const link = problem.id ? `<a class="usearch-card-link" href="https://cses.fi/problemset/task/${problem.id}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open ↗</a>` : '';
    return `<div class="usearch-card ${solved ? 'solved-card' : ''}" onclick="toggleSolve('${cat}', ${idx}); renderUniversalSearch()">
      <div class="usearch-card-check">${solved ? '✓' : ''}</div>
      <span class="usearch-card-name">${highlightMatch(problem.n, q, parsed)}</span>
      <span class="rating-badge ${getRatingClass(problem.r || 1000)}">${problem.r || '?'}</span>
      <span class="usearch-card-cat" style="color:${meta.color}">${meta.label}</span>
      ${link}
    </div>`;
  }

  let html = '';

  if (usearchGroup === 'category') {
    const byCat = {};
    allMatches.forEach(item => {
      if (!byCat[item.cat]) byCat[item.cat] = [];
      byCat[item.cat].push(item);
    });
    for (const cat of Object.keys(PROBLEMS)) {
      if (!byCat[cat]) continue;
      const items = byCat[cat];
      const catMeta = CAT_META[cat];
      html += `<div class="usearch-group-header" style="color:${catMeta.color}">
        ${catMeta.label}
        <span class="usearch-count-badge">${items.length}</span>
      </div>`;
      html += items.map(item => cardHTML(item, query)).join('');
    }
  } else if (usearchGroup === 'rating') {
    const bands = [
      { label: '800–999', min: 800, max: 999 },
      { label: '1000–1199', min: 1000, max: 1199 },
      { label: '1200–1399', min: 1200, max: 1399 },
      { label: '1400–1599', min: 1400, max: 1599 },
      { label: '1600–1899', min: 1600, max: 1899 },
      { label: '1900+', min: 1900, max: Infinity },
    ];
    bands.forEach(band => {
      const items = allMatches.filter(item => {
        const r = item.problem.r || 1000;
        return r >= band.min && r <= band.max;
      });
      if (!items.length) return;
      html += `<div class="usearch-group-header">
        Rating ${band.label}
        <span class="usearch-count-badge">${items.length}</span>
      </div>`;
      html += items.map(item => cardHTML(item, query)).join('');
    });
  } else {
    html = allMatches.map(item => cardHTML(item, query)).join('');
  }

  container.innerHTML = html;
}

// ── Activity Heatmap ──
function getActivity() { return JSON.parse(localStorage.getItem('cses_activity') || '{}'); }
function saveActivity(a) { localStorage.setItem('cses_activity', JSON.stringify(a)); }

function updateActivity(delta) {
  const _d = new Date();
  const today = _d.getFullYear() + '-' + String(_d.getMonth()+1).padStart(2,'0') + '-' + String(_d.getDate()).padStart(2,'0');
  const activity = getActivity();
  activity[today] = Math.max(0, (activity[today] || 0) + delta);
  if (activity[today] === 0) delete activity[today];
  saveActivity(activity);
}

function showHeatmapTip(e, el) {
  const tip = document.getElementById('heatmapTooltip');
  tip.textContent = el.dataset.tip;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 28) + 'px';
}
function hideHeatmapTip() { document.getElementById('heatmapTooltip').style.display = 'none'; }

function renderHeatmap() {
  const container = document.getElementById('heatmapGrid');
  if (!container) return;
  const activity = getActivity();
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const WEEKS = 53;
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const level = n => n <= 0 ? 0 : n === 1 ? 1 : n === 2 ? 2 : n === 3 ? 3 : 4;

  const startDate = new Date(today);
  startDate.setDate(today.getDate() - today.getDay() - 51 * 7);

  const weeks = [];
  const cur = new Date(startDate);
  let total = 0;
  for (let w = 0; w < WEEKS; w++) {
    const days = [];
    for (let d = 0; d < 7; d++) {
      const ds = cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0') + '-' + String(cur.getDate()).padStart(2,'0');
      const count = activity[ds] || 0;
      const future = cur > today;
      if (!future) total += count;
      days.push({ ds, count, future, month: cur.getMonth() });
      cur.setDate(cur.getDate() + 1);
    }
    weeks.push(days);
  }

  const monthPositions = [];
  let lastMonth = -1;
  for (let w = 0; w < WEEKS; w++) {
    const mo = weeks[w][0].month;
    if (mo !== lastMonth) { monthPositions.push({ week: w, name: MONTH_NAMES[mo] }); lastMonth = mo; }
  }
  let monthHtml = '<div class="heatmap-day-spacer"></div>';
  for (let i = 0; i < monthPositions.length; i++) {
    const start = monthPositions[i].week;
    const end = i + 1 < monthPositions.length ? monthPositions[i+1].week : WEEKS;
    const widthPx = (end - start) * 15 - 3;
    monthHtml += `<div class="heatmap-month-label" style="width:${widthPx}px">${monthPositions[i].name}</div>`;
  }

  const dayLabels = ['','Mon','','Wed','','Fri',''].map(d => `<div class="heatmap-day-label">${d}</div>`).join('');

  let weeksHtml = '';
  for (const days of weeks) {
    let weekHtml = '<div class="heatmap-week">';
    for (const { ds, count, future } of days) {
      const lv = future ? 0 : level(count);
      const tip = future ? '' : count > 0 ? `${count} solve${count !== 1 ? 's' : ''} · ${ds}` : `No activity · ${ds}`;
      weekHtml += `<div class="heatmap-cell" data-level="${lv}"${tip ? ` data-tip="${tip}" onmouseenter="showHeatmapTip(event,this)" onmouseleave="hideHeatmapTip()"` : ''}></div>`;
    }
    weekHtml += '</div>';
    weeksHtml += weekHtml;
  }

  container.innerHTML = `
    <div class="heatmap-scroll">
      <div class="heatmap-inner">
        <div class="heatmap-month-row">${monthHtml}</div>
        <div class="heatmap-body-row">
          <div class="heatmap-day-labels">${dayLabels}</div>
          <div class="heatmap-weeks">${weeksHtml}</div>
        </div>
      </div>
    </div>
    <div class="heatmap-footer">
      <span>${total} solve${total !== 1 ? 's' : ''} in the last year</span>
      <div class="heatmap-legend"><span>Less</span>
        <div class="heatmap-cell" data-level="0"></div>
        <div class="heatmap-cell" data-level="1"></div>
        <div class="heatmap-cell" data-level="2"></div>
        <div class="heatmap-cell" data-level="3"></div>
        <div class="heatmap-cell" data-level="4"></div>
        <span>More</span>
      </div>
    </div>`;
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelector(`[data-view="${name}"]`).classList.add('active');

  // Reset and focus usearch when switching to it
  if (name === 'usearch') {
    usearchFilter = 'all';
    usearchRating = null;
    usearchGroup = 'category';
    // Reset usearch chip visuals
    document.querySelectorAll('[data-ufilter="status"]').forEach((c, i) => c.classList.toggle('active', i === 0));
    document.querySelectorAll('[data-ufilter="rating"]').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('[data-ufilter="group"]').forEach((c, i) => c.classList.toggle('active', i === 0));
    setTimeout(() => {
      const inp = document.getElementById('usearchInput');
      if (inp) { inp.value = ''; inp.focus(); }
      renderUniversalSearch();
    }, 80);
  }

  // Reset all filters/search for this category
  if (PROBLEMS[name]) {
    searchTerms[name] = '';
    filters[name] = 'all';
    ratingFilters[name] = null;
    sortOrders[name] = 'cses';

    const view = document.getElementById('view-' + name);

    // Reset sort chips
    const sortChips = view.querySelectorAll('.sort-chip');
    sortChips.forEach(c => c.classList.remove('active'));
    if (sortChips[0]) sortChips[0].classList.add('active');
    const searchInput = view.querySelector('input[type="text"]');
    if (searchInput) searchInput.value = '';

    const chips = view.querySelectorAll('.filter-chip');
    chips.forEach(c => c.classList.remove('active'));
    if (chips[0]) chips[0].classList.add('active'); // 'All' chip

    renderList(name);
  }
}

  document.getElementById('exportOverlay').classList.add('open');

function closeExportModal() {
  document.getElementById('exportOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('exportOverlay')) closeExportModal();
}

async function confirmExport() {
  let filename = document.getElementById('exportFilename').value.trim();
  if (!filename) filename = 'cses-progress-' + new Date().toISOString().split('T')[0] + '.json';
  if (!filename.endsWith('.json')) filename += '.json';

  const data = {
    cses_state: state,
    cses_streak: streak,
    cses_last_visit: lastVisit,
    exported_at: new Date().toISOString()
  };
  const json = JSON.stringify(data, null, 2);

  closeExportModal();

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'JSON File', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
    } catch (err) {
      if (err.name === 'AbortError') return;
      throw err;
    }
  } else {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  const solvedCount = Object.keys(state).filter(k => state[k]?.done).length;
  const notesCount = Object.keys(state).filter(k => state[k]?.notes).length;
  showToast(`✓ Exported — ${solvedCount} solved, ${notesCount} notes`);
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.cses_state) {
        state = data.cses_state;
        localStorage.setItem('cses_state', JSON.stringify(state));
      }
      if (data.cses_streak !== undefined) {
        streak = data.cses_streak;
        localStorage.setItem('cses_streak', streak);
      }
      if (data.cses_last_visit) {
        lastVisit = data.cses_last_visit;
        localStorage.setItem('cses_last_visit', lastVisit);
      }
      renderAll();
      const solvedCount = Object.keys(state).filter(k => state[k]?.done).length;
      const notesCount = Object.keys(state).filter(k => state[k]?.notes).length;
      showToast(`✓ Imported — ${solvedCount} solved, ${notesCount} notes`);
    } catch(err) {
      showToast('⚠ Invalid file — could not import');
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ── Init ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeExportModal();
  if (e.key === 'Enter' && document.getElementById('exportOverlay').classList.contains('open')) {
    e.preventDefault();
    confirmExport();
  }
  // "/" shortcut: switch to universal search and focus input
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    switchView('usearch');
    setTimeout(() => {
      const inp = document.getElementById('usearchInput');
      if (inp) { inp.focus(); inp.select(); }
    }, 100);
  }
});
buildLayout();
renderAll();
</script>
<div class="heatmap-tooltip" id="heatmapTooltip"></div>
</body>
</html>
